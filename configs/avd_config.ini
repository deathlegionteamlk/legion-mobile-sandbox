# Legion Mobile Sandbox — AVD hardware config
# demo x hexa | Team Death Legion
#
# Android 15 (API 35) — Pixel 8 profile
#
# Copy into: ~/.android/avd/LegionDevice.avd/config.ini
# (setup.sh and the notebook write these automatically)

# ── CPU / Memory ─────────────────────────────────────────────
hw.ramSize=4096
hw.cpu.ncore=4
disk.dataPartition.size=8192M
vm.heapSize=512

# ── Display ──────────────────────────────────────────────────
hw.lcd.density=420
hw.lcd.width=1080
hw.lcd.height=2400
skin.name=1080x2400

# ── GPU ──────────────────────────────────────────────────────
hw.gpu.enabled=yes
hw.gpu.mode=swiftshader_indirect

# ── Audio ────────────────────────────────────────────────────
hw.audioInput=no
hw.audioOutput=no

# ── Sensors ──────────────────────────────────────────────────
hw.battery=yes
hw.gps=yes
hw.sensors.proximity=yes
hw.sensors.acceleration=yes
hw.sensors.gyroscope=yes
hw.sensors.magnetic_field=yes

# ── Camera ───────────────────────────────────────────────────
hw.camera.front=none
hw.camera.back=none

# ── SIM card / Telephony ─────────────────────────────────────
# Enables the virtual SIM card inside the emulator.
# The -phone-number flag at launch assigns the actual number.
hw.telephony=yes
hw.telephony.gsm=yes
telephony.simCount=1

# Default SIM operator: T-Mobile US (310-260)
# Change these if you need a different carrier identity.
gsm.sim.operator.numeric=310260
gsm.sim.operator.alpha=T-Mobile
gsm.sim.operator.iso-country=us
gsm.defaultpdpcontext.active=true
gsm.network.type=LTE
gsm.version.ril-impl=android reference-ril 1.0
hw.gsm.network=home
